splunk:
  enabled: true
  protocol: https
  host: 10.202.18.152
  tokenSecretRef:
    # Name of the existing Kubernetes secret.
    name: "splunk-hec-token"
    # Key within the secret that holds the HEC token (default: hec_token).
    key: "token"
  insecureSSL: "true"
  port: "8088"
scheduler:
  profiles: |
    IF_profile:
      frequency: 600
      varBinds:
        - [ "IF-MIB", "ifDescr" ]
        - [ "IF-MIB", "ifAdminStatus" ]
poller:
  inventory: |
    address,port,version,community,secret,security_engine,walk_interval,profiles,smart_profiles,delete
    54.91.99.113,,2c,public,,,1800,IF_profile,false,