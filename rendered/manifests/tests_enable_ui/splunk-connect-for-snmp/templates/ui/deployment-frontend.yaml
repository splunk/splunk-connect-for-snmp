---
# Source: splunk-connect-for-snmp/templates/ui/deployment-frontend.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-frontend-deployment
  labels:
    app: ui-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui-frontend
  template:
    metadata:
      labels:
        app: ui-frontend
    spec:
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        runAsNonRoot: true
        fsGroup: 10000
      containers:
      - name: ui-frontend
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        image: "ghcr.io/splunk/sc4snmp-ui/frontend/container:main"
        imagePullPolicy: Always
        env:
          - name: REACT_APP_FLASK_PORT
            value: "30002"
          - name: DEMO_PORT
            value: "30001"
        ports:
        - containerPort: 30001
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
