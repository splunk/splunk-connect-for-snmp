---
# Source: splunk-connect-for-snmp/templates/worker/trap/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-splunk-connect-for-snmp-worker-trap
  labels:
    app.kubernetes.io/name: splunk-connect-for-snmp
    app.kubernetes.io/component: worker-trap
    app.kubernetes.io/instance: release-name
    helm.sh/chart: splunk-connect-for-snmp-CURRENT-VERSION
    app.kubernetes.io/version: "CURRENT-VERSION"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: splunk-connect-for-snmp
      app.kubernetes.io/component: worker-trap
      app.kubernetes.io/instance: release-name
  template:
    metadata:
      annotations:
        checksum/redis-config: e82c09fa615350d9c147a0884485f953308babd6b8842d0cbe695ed5595eb530
      labels:
        app.kubernetes.io/name: splunk-connect-for-snmp
        app.kubernetes.io/component: worker-trap
        app.kubernetes.io/instance: release-name
    spec:
      serviceAccountName: release-name-splunk-connect-for-snmp-user
      securityContext:
        fsGroup: 10001
      containers:
        - name: splunk-connect-for-snmp-worker-trap
          securityContext:
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
          image: "ghcr.io/splunk/splunk-connect-for-snmp/container:CURRENT-VERSION"
          imagePullPolicy: Always
          args:
            [
              "celery", "worker-trap",
            ]
          env:
            - name: CONFIG_PATH
              value: /app/config/config.yaml
            - name: SC4SNMP_VERSION
              value: CURRENT-VERSION
            - name: REDIS_MODE
              value: "standalone"
            - name: REDIS_HOST
              value: release-name-redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "1"
            - name: CELERY_DB
              value: "0"
            - name: MONGODB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: release-name-mongodb-secret
                  key: root-user
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: release-name-mongodb-secret
                  key: root-password
            - name: MONGODB_MODE
              value: "standalone"
            - name: MONGODB_AUTH_SOURCE
              value: "admin"
            - name: MONGODB_DATABASE
              value: "sc4snmp"
            - name: MONGODB_HOST
              value: release-name-mongodb-0.release-name-mongodb
            - name: MONGODB_PORT
              value: "27017"
            - name: WALK_RETRY_MAX_INTERVAL
              value: "180"
            - name: WALK_MAX_RETRIES
              value: "5"
            - name: METRICS_INDEXING_ENABLED
              value: "false"
            - name: POLL_BASE_PROFILES
              value: "true"
            - name: LOG_LEVEL
              value: INFO
            - name: DISABLE_MONGO_DEBUG_LOGGING
              value: "true"
            - name: UDP_CONNECTION_TIMEOUT
              value: "3"
            - name: MAX_OID_TO_PROCESS
              value: "70"
            - name: MAX_REPETITIONS
              value: "10"
            - name: PYSNMP_DEBUG
              value: ""
            - name: PROFILES_RELOAD_DELAY
              value: "60"
            - name: MIB_SOURCES
              value: "http://release-name-mibserver/asn1/@mib@"
            - name: MIB_INDEX
              value: "http://release-name-mibserver/index.csv"
            - name: MIB_STANDARD
              value: "http://release-name-mibserver/standard.txt"
            - name: WORKER_CONCURRENCY
              value: "4"
            - name: PREFETCH_COUNT
              value: "30"
            - name: MAX_TASKS_PER_CHILD
              value: "0"
            - name: RESOLVE_TRAP_ADDRESS
              value: "false"
            - name: MAX_DNS_CACHE_SIZE_TRAPS
              value: "500"
            - name: TTL_DNS_CACHE_TRAPS
              value: "1800"
            - name: IPv6_ENABLED
              value: "false"
          volumeMounts:
            - name: config
              mountPath: "/app/config"
              readOnly: true
            - name: pysnmp-cache-volume
              mountPath: "/.pysnmp/"
              readOnly: false
            - name: tmp
              mountPath: "/tmp/"
              readOnly: false
          resources:
            limits:
              cpu: 500m
            requests:
              cpu: 250m
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - test $(($(date +%s) - $(stat -c %Y /tmp/worker_heartbeat))) -lt 10
            initialDelaySeconds: 60
            periodSeconds: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - test -e /tmp/worker_ready
            initialDelaySeconds: 30
            periodSeconds: 5
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                      app.kubernetes.io/name: splunk-connect-for-snmp
                      app.kubernetes.io/component: worker-trap
                      app.kubernetes.io/instance: release-name
      volumes:
        # You set volumes at the Pod level, then mount them into containers inside that Pod
        - name: config
          configMap:
            # Provide the name of the ConfigMap you want to mount.
            name: splunk-connect-for-snmp-config
            # An array of keys from the ConfigMap to create as files
            items:
              - key: "config.yaml"
                path: "config.yaml"
        - name: pysnmp-cache-volume
          emptyDir: {}
        - name: tmp
          emptyDir: {}
