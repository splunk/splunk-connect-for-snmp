# HEC token from an existing Kubernetes Secret (e.g. synced by External Secrets, or created manually).
# Create the Secret first, e.g.:
#   kubectl create secret generic my-splunk-hec-secret --from-literal=hec_token='YOUR_HEC_TOKEN' -n <namespace>
splunk:
  enabled: true
  protocol: https
  host: splunk.example.com
  port: "8088"
  insecureSSL: "false"
  tokenSecretRef:
    name: my-splunk-hec-secret
    key: hec_token
scheduler:
  profiles: |
    generic_switch:
      frequency: 300
      varBinds:
        - ['SNMPv2-MIB', 'sysDescr']
        - ['SNMPv2-MIB', 'sysName', 0]
        - ['IF-MIB']
poller:
  inventory: |
    address,port,version,community,secret,security_engine,walk_interval,profiles,smart_profiles,delete
    10.0.0.1,,2c,public,,,1800,generic_switch,,
