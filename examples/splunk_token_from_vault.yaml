# HEC token from a file injected by a secret manager (e.g. Vault Agent Injector).
# The pod annotations below are provider-specific; adjust them to match your secret
# manager.
#
# Example using HashiCorp Vault Agent Injector (KV v2):
# 1. Store the token in Vault: vault kv put secret/sc4snmp/hec-token token="###SPLUNK_TOKEN###"
# 2. tokenFilePath must match the injector output: annotation agent-inject-secret-<name> -> file at /vault/secrets/<name>
# 3. The template ensures the file contains only the token value, not JSON.
splunk:
  enabled: true
  protocol: https
  host: splunk.example.com
  port: "8088"
  insecureSSL: "false"
  tokenFilePath: /vault/secrets/hec-token
worker:
  sender:
    podAnnotations:
      vault.hashicorp.com/agent-inject: "true"
      vault.hashicorp.com/role: sc4snmp-hec-role
      vault.hashicorp.com/agent-inject-secret-hec-token: "secret/data/sc4snmp/hec-token"
      vault.hashicorp.com/agent-inject-template-hec-token: |
        {{- with secret "secret/data/sc4snmp/hec-token" -}}
        {{ .Data.data.token }}
        {{- end }}
scheduler:
  profiles: |
    generic_switch:
      frequency: 300
      varBinds:
        - ['SNMPv2-MIB', 'sysDescr']
        - ['SNMPv2-MIB', 'sysName', 0]
        - ['IF-MIB']
poller:
  inventory: |
    address,port,version,community,secret,security_engine,walk_interval,profiles,smart_profiles,delete
    10.0.0.1,,2c,public,,,1800,generic_switch,,
