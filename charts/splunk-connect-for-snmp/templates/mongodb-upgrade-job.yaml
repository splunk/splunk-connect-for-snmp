apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-fcv-check
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      containers:
        - name: mongo-fcv-check
          image: docker.io/bitnami/mongodb:6.0.10-debian-11-r8
          command:
            - /bin/bash
            - -c
            - |
              echo "Checking FCV na mongodb-0..."
              FCV=$(mongo --host mongodb-0.mongodb-headless.default.svc.cluster.local --quiet --eval 'db.adminCommand({ getParameter: 1, featureCompatibilityVersion: 1 }).featureCompatibilityVersion.version')
              echo "Current FCV: $FCV"

              if [ "$(printf '%s\n' "$FCV" "6.0" | sort -V | head -n1)" != "6.0" ]; then
                echo "FCV < 6.0, setting na 6.0"
                mongo --host mongodb-0.mongodb-headless.default.svc.cluster.local --eval 'db.adminCommand({ setFeatureCompatibilityVersion: "6.0" })'
              else
                echo "FCV >= 6.0, nothing to be changed"
              fi
      restartPolicy: Never
