{{- if eq .Values.redis.architecture "standalone" }}
{{- $bitnamiPVC := printf "redis-data-%s-redis-master-0" .Release.Name }}
{{- $existingPVC := lookup "v1" "PersistentVolumeClaim" .Release.Namespace $bitnamiPVC }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-redis
spec:
  serviceName: {{ .Release.Name }}-redis
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-redis
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-redis
    spec:
      {{- with .Values.redis.podSecurityContext }}
      securityContext:
        runAsUser: {{ .runAsUser }}
        fsGroup: {{ .fsGroup }}
      {{- end }}
      initContainers:
      - name: fix-permissions
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Fixing permissions on /data..."
          chown -R 999:999 /data
          chmod -R 755 /data
          echo "Permissions fixed"
          ls -ln /data
        volumeMounts:
        - name: redis-data
          mountPath: /data
        securityContext:
          runAsUser: 0  # Run as root to change ownership
      containers:
      - name: redis
        image: {{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}
        imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
        ports:
        - containerPort: 6379
          name: redis
        command:
        - sh
        - -c
        args:
        - |
          # Copy config to writable location
          cp /etc/redis/redis.conf /tmp/redis.conf

          {{- if .Values.redis.auth.enabled }}
          # Append password at runtime
          echo "requirepass $REDIS_PASSWORD" >> /tmp/redis.conf
          {{- end }}

          # Start Redis
          exec redis-server /tmp/redis.conf
        {{- if .Values.redis.auth.enabled }}
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.redis.auth.existingSecret | default (printf "%s-redis-secret" .Release.Name) }}
              key: {{ .Values.redis.auth.existingSecretPasswordKey | default "password" }}
        {{- end }}
        volumeMounts:
        - name: redis-data
          mountPath: /data
        - name: redis-config
          mountPath: /etc/redis
        resources:
          {{- toYaml .Values.redis.resources | nindent 10 }}
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - |
              {{- if .Values.redis.auth.enabled }}
              redis-cli -a "$REDIS_PASSWORD" ping
              {{- else }}
              redis-cli ping
              {{- end }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - |
              {{- if .Values.redis.auth.enabled }}
              redis-cli -a "$REDIS_PASSWORD" ping
              {{- else }}
              redis-cli ping
              {{- end }}
          initialDelaySeconds: 5
          periodSeconds: 5
      {{- if and .Values.redis.storage.enabled $existingPVC }}
      # Reuse existing Bitnami PVC
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: {{ $bitnamiPVC }}
      - name: redis-config
        configMap:
          name: {{ .Release.Name }}-redis-config
      {{- else }}
      volumes:
      - name: redis-config
        configMap:
          name: {{ .Release.Name }}-redis-config
      {{- end }}
  {{- if and .Values.redis.storage.enabled (not $existingPVC) }}
  # No existing PVC found, create new one via volumeClaimTemplates
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: {{ toYaml .Values.redis.storage.accessModes | nindent 8 }}
      {{- if .Values.redis.storage.storageClassName }}
      storageClassName: {{ .Values.redis.storage.storageClassName }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.redis.storage.size }}
  {{- end }}
{{- end }}