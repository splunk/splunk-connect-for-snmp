{{- if eq .Values.mongodb.mode "replication" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mongodb-headless
  labels:
    {{- include "splunk-connect-for-snmp.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ .Release.Name }}-mongodb
spec:
  clusterIP: None
  ports:
    - name: mongodb
      port: {{ .Values.mongodb.service.port }}
  selector:
    app: {{ .Release.Name }}-mongodb
{{- end }}
