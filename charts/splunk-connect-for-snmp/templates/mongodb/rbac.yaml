{{- if eq .Values.mongodb.mode "replication" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-mongodb-init-sa
  labels:
    app: {{ .Release.Name }}-mongodb
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-mongodb-init-role
  labels:
    app: {{ .Release.Name }}-mongodb
rules:
- apiGroups: [""]
  resources: ["pods", "pods/exec"]
  verbs: ["get", "list", "create"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-mongodb-init-rb
  labels:
    app: {{ .Release.Name }}-mongodb
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-mongodb-init-sa
roleRef:
  kind: Role
  name: {{ .Release.Name }}-mongodb-init-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}