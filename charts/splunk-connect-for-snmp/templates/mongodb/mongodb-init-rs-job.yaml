{{- if eq .Values.mongodb.mode "replicaset" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-mongodb-init-rs
  labels:
    app: {{ .Release.Name }}-mongodb-init
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ .Release.Name }}-mongodb-init-sa
      containers:
      - name: init-replicaset
        image: alpine/k8s:1.31.3
        command:
        - sh
        - -c
        - |
          set -e

          echo "=========================================="
          echo " MongoDB Replica Set Initialization"
          echo "=========================================="
          echo ""

          echo "Waiting for all {{ .Values.mongodb.replicaCount }} pods to be ready..."
          {{- range $i := until (int .Values.mongodb.replicaCount) }}
          kubectl wait --for=condition=ready pod/{{ $.Release.Name }}-mongodb-{{ $i }} --timeout=600s
          echo "  ✅ Pod {{ $i }} ready"
          {{- end }}

          echo "Checking replica set status..."
          RS_STATUS=$(kubectl exec {{ .Release.Name }}-mongodb-0 -- mongosh \
            {{- if .Values.mongodb.auth.enabled }}
            -u "$MONGO_ROOT_USER" -p "$MONGO_ROOT_PASSWORD" --authenticationDatabase admin \
            {{- end }}
            --quiet --eval "try { rs.status().ok } catch(e) { 0 }" 2>/dev/null | tail -1)

          if [ "$RS_STATUS" = "1" ]; then
            echo "✅ Already initialized"
            exit 0
          fi

          echo "Initializing replica set..."
          kubectl exec {{ .Release.Name }}-mongodb-0 -- mongosh \
            {{- if .Values.mongodb.auth.enabled }}
            -u "$MONGO_ROOT_USER" -p "$MONGO_ROOT_PASSWORD" --authenticationDatabase admin \
            {{- end }}
            --eval "rs.initiate({_id:'{{ .Values.mongodb.replicaSetName }}',members:[{{- range $i := until (int .Values.mongodb.replicaCount) }}{_id:{{ $i }},host:'{{ $.Release.Name }}-mongodb-{{ $i }}.{{ $.Release.Name }}-mongodb-headless:27017'}{{ if ne $i (sub (int $.Values.mongodb.replicaCount) 1) }},{{- end }}{{- end }}]})" || echo "Init completed"

          echo ""
          echo "Waiting 15s for PRIMARY election..."
          sleep 15

          echo ""
          kubectl exec {{ .Release.Name }}-mongodb-0 -- mongosh \
            {{- if .Values.mongodb.auth.enabled }}
            -u "$MONGO_ROOT_USER" -p "$MONGO_ROOT_PASSWORD" --authenticationDatabase admin \
            {{- end }}
            --quiet --eval "rs.status().members.forEach(m => print(m.name + ': ' + m.stateStr))" || true

          echo ""
          echo "✅ Initialization complete"

        {{- if .Values.mongodb.auth.enabled }}
        env:
          {{ include "splunk-connect-for-snmp.mongodb-auth" . | nindent 10}}
        {{- end }}

        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
{{- end }}