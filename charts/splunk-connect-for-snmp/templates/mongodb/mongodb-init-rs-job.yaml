{{- if eq .Values.mongodb.mode "replicaset" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-mongodb-init-rs
  labels:
    app: {{ .Release.Name }}-mongodb-init
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: init-replicaset
        image: {{ .Values.mongodb.image.repository }}:{{ .Values.mongodb.image.tag }}
        command:
        - bash
        - -c
        - |
          set -e

          echo "#############################################"
          echo "# MongoDB Replica Set Initialization"
          echo "#############################################"

          echo ""
          echo "Waiting for MongoDB pods..."

          {{- range $i := until (int .Values.mongodb.replicaCount) }}
          echo "Checking pod {{ $i }}..."
          for retry in {1..60}; do
            if mongosh --host {{ $.Release.Name }}-mongodb-{{ $i }}.{{ $.Release.Name }}-mongodb-headless:27017 \
              {{- if $.Values.mongodb.auth.enabled }}
              -u "$MONGO_ROOT_USER" -p "$MONGO_ROOT_PASSWORD" --authenticationDatabase admin \
              {{- end }}
              --quiet --eval "db.adminCommand({ping:1})" >/dev/null 2>&1; then
              echo "✔ Pod {{ $i }} ready"
              break
            fi

            if [ $retry -eq 60 ]; then
              echo "❌ TIMEOUT waiting for pod {{ $i }}"
              exit 1
            fi

            sleep 5
          done
          {{- end }}

          echo ""
          echo "Checking replica set status…"

          RS_CHECK=$(mongosh --host {{ .Release.Name }}-mongodb-0.{{ .Release.Name }}-mongodb-headless:27017 \
            {{- if .Values.mongodb.auth.enabled }}
            -u "$MONGO_ROOT_USER" -p "$MONGO_ROOT_PASSWORD" --authenticationDatabase admin \
            {{- end }}
            --quiet --eval "try { rs.status().ok } catch(e) { 0 }" | grep -E '^[01]$' || echo "0")

          if [ "$RS_CHECK" = "1" ]; then
            echo "✔ Replica set already initialized"
            exit 0
          fi

          echo "Initializing replica set..."

          mongosh --host {{ .Release.Name }}-mongodb-0.{{ .Release.Name }}-mongodb-headless:27017 \
            {{- if .Values.mongodb.auth.enabled }}
            -u "$MONGO_ROOT_USER" -p "$MONGO_ROOT_PASSWORD" --authenticationDatabase admin \
            {{- end }}
            --eval '
              rs.initiate({
                _id: "{{ .Values.mongodb.replicaSetName }}",
                members: [
                  {{- range $i := until (int .Values.mongodb.replicaCount) }}
                  { _id: {{ $i }}, host: "{{ $.Release.Name }}-mongodb-{{ $i }}.{{ $.Release.Name }}-mongodb-headless:27017" }{{ if ne $i (sub (int $.Values.mongodb.replicaCount) 1) }},{{ end }}
                  {{- end }}
                ]
              })
            '

          echo "Waiting for PRIMARY election..."
          sleep 15

          echo "Final replica set status:"
          mongosh --host {{ .Release.Name }}-mongodb-0.{{ .Release.Name }}-mongodb-headless:27017 \
            {{- if .Values.mongodb.auth.enabled }}
            -u "$MONGO_ROOT_USER" -p "$MONGO_ROOT_PASSWORD" --authenticationDatabase admin \
            {{- end }}
            --quiet --eval "rs.status().members.forEach(m => print(m.name + \" → \" + m.stateStr))"
          echo "Initialization done."

{{- end }}