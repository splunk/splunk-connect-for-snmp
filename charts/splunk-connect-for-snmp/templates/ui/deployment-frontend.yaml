{{ if .Values.UI.enable }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-frontend-deployment
  labels:
    app: ui-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui-frontend
  template:
    metadata:
      labels:
        app: ui-frontend
    spec:
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        runAsNonRoot: true
        fsGroup: 10000
      containers:
      - name: ui-frontend
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        image: {{ include "splunk-connect-for-snmp.uiFrontImage" . | quote }}
        imagePullPolicy: {{ .Values.UI.frontEnd.pullPolicy }}
        env:
          - name: REACT_APP_FLASK_PORT
            value: {{ quote .Values.UI.backEnd.NodePort }}
          - name: DEMO_PORT
            value: {{ quote .Values.UI.frontEnd.NodePort }}
        ports:
        - containerPort: {{ .Values.UI.frontEnd.NodePort }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}