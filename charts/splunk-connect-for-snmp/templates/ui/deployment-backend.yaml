{{ if .Values.UI.enable }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-backend-deployment
  labels:
    app: ui-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui-backend
  template:
    metadata:
      labels:
        app: ui-backend
      annotations:
        {{- include "splunk-connect-for-snmp.redis-annotations" . | nindent 8 }}
    spec:
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
      {{- if .Values.UI.valuesFileDirectory }}
      initContainers:
        - name: patch-log-dirs
          image: {{ .Values.UI.init.repository }}
          imagePullPolicy: {{ .Values.UI.init.pullPolicy }}
          command: [ 'sh', '-c', '
                mkdir -p {{ include "splunk-connect-for-snmp-ui.hostMountPath" . }};
                chmod -v g+rwxs {{ include "splunk-connect-for-snmp-ui.hostMountPath" . }};
                if [ -d "{{ include "splunk-connect-for-snmp-ui.hostMountPath" . }}" ];
                then
                    setfacl -n -Rm d:m::rwx,m::rwx,d:g:10000:rwx,g:10000:rwx {{ include "splunk-connect-for-snmp-ui.hostMountPath" . }};
                fi;' ]
          securityContext:
            runAsUser: 0
          volumeMounts:
          - name: values-directory
            mountPath: {{ include "splunk-connect-for-snmp-ui.hostMountPath" . }}
      {{- end }}
      containers:
      - name: ui-backend
        image: {{ include "splunk-connect-for-snmp.uiBackImage" . | quote }}
        imagePullPolicy: {{ .Values.UI.backEnd.pullPolicy }}
        command: ["sh","-c","/flask_start.sh"]
        env:
        {{ include "splunk-connect-for-snmp.redis-env" . | nindent 8 }}
        {{ include "splunk-connect-for-snmp.mongodb-env" . | nindent 8 }}
        - name: JOB_CONFIG_PATH
          value: /config/job_config.yaml
        - name: JOB_NAMESPACE
          value: {{ .Release.Namespace | quote }}
        - name: VALUES_DIRECTORY
          {{- if .Values.UI.valuesFileDirectory }}
          value: {{ include "splunk-connect-for-snmp-ui.hostMountPath" . }}
          {{- else }}
          value:
          {{- end }}
        - name: VALUES_FILE
          value: {{ .Values.UI.valuesFileName }}
        - name: KEEP_TEMP_FILES
          value: {{ quote .Values.UI.keepSectionFiles | default "false" }}
        - name: AUTH_ENABLED
          value: {{ .Values.UI.auth.enabled | quote }}
        {{- if .Values.UI.auth.enabled }}
        {{- if not .Values.UI.auth.existingSecret }}
        {{- fail "UI.auth.existingSecret is required when UI.auth.enabled=true. Create a Kubernetes Secret in the release namespace with keys 'username', 'password_hash', and 'jwt_secret', then set UI.auth.existingSecret to its name. Credentials must not be provided via values.yaml." }}
        {{- end }}
        - name: AUTH_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.UI.auth.existingSecret }}
              key: username
        - name: AUTH_PASSWORD_HASH
          valueFrom:
            secretKeyRef:
              name: {{ .Values.UI.auth.existingSecret }}
              key: password_hash
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.UI.auth.existingSecret }}
              key: jwt_secret
        {{- end }}
        - name: JWT_EXPIRY_HOURS
          value: {{ .Values.UI.auth.jwtExpiryHours | quote }}
        - name: IDLE_TIMEOUT_MINUTES
          value: {{ .Values.UI.auth.idleTimeoutMinutes | quote }}
        - name: SECURE_COOKIES
          value: {{ .Values.UI.auth.secureCookies | quote }}
        {{- $allowedOrigins := default .Values.UI.auth.allowedOrigins .Values.UI.allowedOrigins }}
        {{- if $allowedOrigins }}
        - name: ALLOWED_ORIGINS
          value: {{ $allowedOrigins | quote }}
        {{- end }}
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: backend-configmap
          mountPath: /config
        {{- if .Values.UI.valuesFileDirectory }}
        - name: values-directory
          mountPath: {{ include "splunk-connect-for-snmp-ui.hostMountPath" . }}
        {{- end }}
      serviceAccountName: job-robot
      volumes:
        - name: backend-configmap
          configMap:
            name: {{ include "splunk-connect-for-snmp.name" . }}-job-configmap
            items:
              - key: job_config
                path: job_config.yaml
        {{- if .Values.UI.valuesFileDirectory }}
        - name: values-directory
          hostPath:
            path: {{ .Values.UI.valuesFileDirectory }}
        {{- end }}
{{- end }}