splunk:
  enabled: true
  protocol: https
  host: ###LOAD_BALANCER_ID###
  token: ###SPLUNK_TOKEN###
  insecureSSL: "true"
  port: "8088"
image:
  repository: "snmp-local"
  tag: "latest"
  pullPolicy: "Never"
traps:
  replicaCount: 1
  communities:
    1:
      - publicv1
    2c:
      - public
      - homelab
  #usernameSecrets:
  #  - sc4snmp-hlab-sha-aes
  #  - sc4snmp-hlab-sha-des

  #loadBalancerIP: The IP address in the metallb pool
  loadBalancerIP: ###LOAD_BALANCER_ID###
worker:
  poller:
    replicaCount: 1
    #changed replicaCount from 4 to 1
    concurrency: 4
    prefetch: 1
  trap:
    autoscaling:
      enabled: false
    replicaCount: 1
    concurrency: 8
    prefetch: 60
    enableIncludeUnresolvedVarbinds: true
  sender:
    replicaCount: 1
    concurrency: 4
    prefetch: 60
  profilesReloadDelay: 1
  # replicas: Number of replicas for worker container should two or more
  # udpConnectionTimeout: timeout in seconds for SNMP operations
  udpConnectionTimeout: 5
  udpConnectionRetries: 1
  logLevel: "DEBUG"
scheduler:
  logLevel: "INFO"
  customTranslations:
    IP-MIB:
      icmpOutEchoReps: myCustomName1
  profiles: |
    v3profile:
      frequency: 5
      varBinds:
        - ['IF-MIB']
        - ['TCP-MIB']
        - ['UDP-MIB']
#  profiles: |
#    generic_switch:
#      frequency: 60
#      varBinds:
#        - ['SNMPv2-MIB', 'sysDescr']
#        - ['SNMPv2-MIB', 'sysName', 0]
#        - ['IF-MIB']
#        - ['TCP-MIB']
  groups: |
    {}
  tasksExpiryTime: 300
poller:
  enableFullWalk: true
  usernameSecrets:
    - sv3poller
 #   - sc4snmp-hlab-sha-aes
 #   - sc4snmp-hlab-sha-des
  inventory: |
    address,port,version,community,secret,security_engine,walk_interval,profiles,smart_profiles,delete
    ###LOAD_BALANCER_ID###,,2c,public,,,600,,,
sim:
  # sim must be enabled if you want to use signalFx
  enabled: false
#  signalfxToken: BCwaJ_Ands4Xh7Nrg
#  signalfxRealm: us0
discovery:
  enabled: true
  subnetDiscoveryConcurrency: 15
  ipv6Enabled: false
  logLevel: "DEBUG"
  discoveryPath: "###DISCOVERY_PATH###"
  usernameSecrets:
    - autodiscovery-v3-sha-aes
    - autodiscovery-v3-md5-aes
  autodiscovery:
    integration_v2c:
      frequency: 21600
      delete_already_discovered: true
      network_address: 10.1.1.0/24
      version: "2c"
      community: public
      port: 161
      device_rules:
        - name: integration-v2c-agents
          patterns: "*autodiscovery integration v2c*"
          group: autodiscovery-v2c
    integration_v3_sha:
      frequency: 21600
      delete_already_discovered: true
      network_address: 10.2.2.0/24
      version: "3"
      secret: autodiscovery-v3-sha-aes
      security_engine: "8000000903000A3900000101"
      port: 161
      device_rules:
        - name: integration-v3-sha-agents
          patterns: "*autodiscovery integration v3 SHA*"
          group: autodiscovery-v3-sha
    integration_v3_md5:
      frequency: 21600
      delete_already_discovered: true
      network_address: 10.3.3.0/24
      version: "3"
      secret: autodiscovery-v3-md5-aes
      security_engine: "8000000903000A3900000102"
      port: 161
      device_rules:
        - name: integration-v3-md5-agents
          patterns: "*autodiscovery integration v3 MD5*"
          group: autodiscovery-v3-md5
